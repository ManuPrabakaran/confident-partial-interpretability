# Copy to .github/workflows/ci.yml and push once your PAT has the `workflow` scope
# (or create the workflow in the GitHub Actions tab).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Synthetic demo (sanity)
        run: python experiments/synthetic_demo.py --out outputs/ci_synthetic.json
